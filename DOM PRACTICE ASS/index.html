<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Practice</title>
    <style>
        .highlight { background-color: yellow; font-weight: bold; }
        .container { padding: 20px; border: 1px solid #ccc; margin-top: 10px; }
        .error { border: 2px solid red; }
    </style>
</head>
<body>
    <header id="main-header">
        <h1>DOM Practice</h1>
        <nav aria-label="Main Navigation">
            <ul class="nav-list">
                <li><a href="#" class="nav-link">Home</a></li>
                <li><a href="#" class="nav-link">About</a></li>
                <li><a href="#" class="nav-link">Contact</a></li>
            </ul>
        </nav>
    </header>
    
    <main class="container">
        <article id="main-article">
            <h2 class="title">Article Title</h2>
            <p class="content">This is the first paragraph.</p>
            <p class="content">This is the second paragraph.</p>
            <button id="highlight-btn">Highlight Text</button>
        </article>
        
        <section>
            <h2>Form Section</h2>
            <form id="contact-form">
                <input type="text" id="username" name="username" placeholder="Name" required>
                <input type="email" id="email" name="email" placeholder="Email" required>
                <button type="submit">Submit</button>
            </form>
            <p id="form-feedback"></p>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2026 DOM Practice Lab</p>
    </footer>
    
    <script src="dom.js"></script>
</body>
</html>
